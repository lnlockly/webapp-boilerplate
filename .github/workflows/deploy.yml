name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: webapp
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/webapp?schema=public
      JWT_SECRET: ci-fake-secret-do-not-use-anywhere-real
      COOKIE_SECRET: ci-fake-cookie-secret-also-bogus
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @app/backend exec prisma generate
      - run: pnpm --filter @app/backend exec prisma migrate deploy
      - run: pnpm build
      - run: pnpm test || true   # placeholder until real tests are added
